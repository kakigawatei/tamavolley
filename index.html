<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ナンシキ村のポンポン♪</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#87c9ef;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
canvas{display:block;width:100vw;height:100vh}
</style>

<body>
<canvas id="c"></canvas>
<script>
"use strict";
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener("resize",resize);resize();

const FONT="'Hiragino Maru Gothic ProN','Rounded Mplus 1c','BIZ UDGothic',sans-serif";
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- perspective ---------- */
// ローカメラ（目線＝ネット高さ）・ワイド画角・ボレー距離
const K=1.7,S1=1/(1+K);
const sc=z=>1/(1+K*z);
const gy=z=>{const u=(1-sc(z))/(1-S1);return H*0.93-(H*0.93-H*0.56)*u;};
const sx=(x,z)=>W/2+x*0.62*W*sc(z);
const sy=(z,y)=>gy(z)-y*0.85*H*sc(z);
const NETZ=0.38,OPPZ=0.78; // ネットと相手の距離（プレイヤーは中間ポジション）

/* ---------- audio ---------- */
let AC=null;
function beep(f,d,type,g){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    const o=AC.createOscillator(),ga=AC.createGain(),t=AC.currentTime;
    o.type=type||"triangle";o.frequency.setValueAtTime(f,t);
    ga.gain.setValueAtTime(g||0.15,t);
    ga.gain.exponentialRampToValueAtTime(0.001,t+(d||0.12));
    o.connect(ga);ga.connect(AC.destination);o.start(t);o.stop(t+(d||0.12));
  }catch(e){}
}

/* ---------- hit sound (提供mp3) ---------- */
let hitRaw=null,hitBuf=null;
fetch("hit.mp3").then(r=>r.arrayBuffer()).then(b=>{hitRaw=b;tryDecodeHit();}).catch(()=>{});
function tryDecodeHit(){
  if(AC&&hitRaw&&!hitBuf)AC.decodeAudioData(hitRaw.slice(0),b=>{hitBuf=b;},()=>{});
}
function playHit(vol){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    tryDecodeHit();
    if(hitBuf){
      const s=AC.createBufferSource(),g=AC.createGain();
      g.gain.value=vol||1;
      s.buffer=hitBuf;s.connect(g);g.connect(AC.destination);s.start();
      return;
    }
  }catch(e){}
  beep(880,0.10,"triangle",0.16); // mp3未ロード時のフォールバック
}

/* ---------- character drawing ---------- */
const HATS=["cap","hachimaki","visor","china","arrow"];
function drawChar(x,y,r,hat,back){
  ctx.save();ctx.translate(x,y);
  const lw=Math.max(1.5,r*0.09);
  ctx.lineWidth=lw;ctx.lineJoin="round";ctx.lineCap="round";
  const ry=r*(hat==="arrow"?1.12:1);
  // body + shading
  ctx.beginPath();ctx.ellipse(0,0,r,ry,0,0,Math.PI*2);
  ctx.fillStyle="#fff";ctx.fill();
  ctx.save();ctx.clip();
  ctx.fillStyle="#e7e7e7";ctx.fillRect(-r*1.1,-ry*1.1,r*2.2,ry*2.2);
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.ellipse(r*0.10,-ry*0.10,r*0.99,ry*0.99,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.beginPath();ctx.ellipse(0,0,r,ry,0,0,Math.PI*2);
  ctx.strokeStyle="#1a1a1a";ctx.stroke();

  if(!back){
    // blush
    ctx.fillStyle="#ffb3c8";
    ctx.beginPath();ctx.ellipse(-r*0.55,r*0.10,r*0.16,r*0.10,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse( r*0.55,r*0.10,r*0.16,r*0.10,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#1a1a1a";ctx.fillStyle="#1a1a1a";
    if(hat==="hachimaki"){
      // happy closed eyes + zigzag mouth
      ctx.beginPath();ctx.arc(-r*0.30,-r*0.10,r*0.15,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
      ctx.beginPath();ctx.arc( r*0.30,-r*0.10,r*0.15,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
      ctx.beginPath();
      const zw=r*0.16;let px0=-zw*3;
      ctx.moveTo(px0,r*0.30);
      for(let i=1;i<=6;i++)ctx.lineTo(px0+zw*i,r*0.30+(i%2?-r*0.22:0));
      ctx.stroke();
    }else{
      // dot eyes
      ctx.beginPath();ctx.ellipse(-r*0.30,-r*0.16,r*0.075,r*0.105,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse( r*0.30,-r*0.16,r*0.075,r*0.105,0,0,Math.PI*2);ctx.fill();
      if(hat==="cap"){
        ctx.beginPath();ctx.moveTo(-r*0.30,r*0.22);ctx.lineTo(r*0.30,r*0.22);ctx.stroke();
      }else if(hat==="china"){
        ctx.beginPath();ctx.arc(0,r*0.14,r*0.32,0,Math.PI);
        ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle="#1a1a1a";ctx.stroke();
        ctx.beginPath();ctx.moveTo(-r*0.32,r*0.14);ctx.lineTo(r*0.32,r*0.14);ctx.stroke();
      }else{
        ctx.beginPath();ctx.arc(0,r*0.10,r*0.30,Math.PI*0.15,Math.PI*0.85);ctx.stroke();
      }
    }
  }

  /* hats */
  ctx.strokeStyle="#1a1a1a";
  if(hat==="cap"){
    ctx.beginPath();ctx.ellipse(r*0.62,-ry*0.62,r*0.42,r*0.16,-0.35,0,Math.PI*2);
    ctx.fillStyle="#8ee6e6";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(0,-ry*0.28,r*0.80,Math.PI*1.02,Math.PI*1.98);
    ctx.closePath();ctx.fillStyle="#f4514f";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*0.05,-ry*1.06);
    ctx.quadraticCurveTo(r*0.55,-ry*0.95,r*0.72,-ry*0.55);
    ctx.quadraticCurveTo(r*0.35,-ry*0.62,r*0.05,-ry*1.06);
    ctx.fillStyle="#26295c";ctx.fill();ctx.stroke();
  }else if(hat==="hachimaki"){
    ctx.beginPath();
    ctx.moveTo(-r*0.92,-ry*0.28);
    ctx.quadraticCurveTo(0,-ry*0.62,r*0.92,-ry*0.28);
    ctx.lineTo(r*0.86,-ry*0.02);
    ctx.quadraticCurveTo(0,-ry*0.36,-r*0.86,-ry*0.02);
    ctx.closePath();ctx.fillStyle="#ffe94d";ctx.fill();ctx.stroke();
    // knot tails
    ctx.beginPath();ctx.moveTo(r*0.82,-ry*0.14);ctx.lineTo(r*1.35,-ry*0.02);ctx.lineTo(r*1.28,ry*0.12);ctx.lineTo(r*0.80,ry*0.0);ctx.closePath();
    ctx.fillStyle="#ffe94d";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*0.80,ry*0.02);ctx.lineTo(r*1.18,ry*0.28);ctx.lineTo(r*1.05,ry*0.40);ctx.lineTo(r*0.74,ry*0.14);ctx.closePath();
    ctx.fillStyle="#ffe94d";ctx.fill();ctx.stroke();
    if(r>17&&!back){
      ctx.fillStyle="#1a1a1a";
      ctx.font="bold "+(r*0.24)+"px "+FONT;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("必",-r*0.20,-ry*0.34);
      ctx.fillText("勝", r*0.20,-ry*0.34);
    }
  }else if(hat==="visor"){
    ctx.beginPath();ctx.arc(0,-ry*0.30,r*0.78,Math.PI*1.05,Math.PI*1.95);
    ctx.strokeStyle="#f591c2";ctx.lineWidth=lw*2.2;ctx.stroke();
    ctx.lineWidth=lw;ctx.strokeStyle="#1a1a1a";
    ctx.beginPath();ctx.ellipse(-r*0.30,-ry*0.52,r*0.85,r*0.26,-0.22,0,Math.PI*2);
    ctx.fillStyle="#f591c2";ctx.fill();ctx.stroke();
    // ponytail
    ctx.beginPath();ctx.ellipse(r*0.60,-ry*0.72,r*0.14,r*0.17,0.5,0,Math.PI*2);
    ctx.fillStyle="#f7a469";ctx.fill();ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.68,-ry*0.84);
    ctx.bezierCurveTo(r*1.15,-ry*1.30,r*1.60,-ry*1.20,r*1.42,-ry*0.92);
    ctx.bezierCurveTo(r*1.28,-ry*0.70,r*0.95,-ry*0.62,r*0.70,-ry*0.62);
    ctx.closePath();ctx.fillStyle="#fff";ctx.fill();ctx.stroke();
  }else if(hat==="china"){
    ctx.beginPath();ctx.moveTo(-r*0.66,-ry*0.55);
    ctx.quadraticCurveTo(0,-ry*1.30,r*0.66,-ry*0.55);
    ctx.closePath();ctx.fillStyle="#4fc63f";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-ry*1.10);
    ctx.quadraticCurveTo(r*0.16,-ry*0.80,r*0.22,-ry*0.56);
    ctx.lineTo(-r*0.22,-ry*0.56);
    ctx.quadraticCurveTo(-r*0.16,-ry*0.80,0,-ry*1.10);
    ctx.fillStyle="#2757e8";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*0.70,-ry*0.55);
    ctx.quadraticCurveTo(0,-ry*0.75,r*0.70,-ry*0.55);
    ctx.lineTo(r*0.66,-ry*0.40);
    ctx.quadraticCurveTo(0,-ry*0.60,-r*0.66,-ry*0.40);
    ctx.closePath();ctx.fillStyle="#1c2030";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(0,-ry*1.12,r*0.11,0,Math.PI*2);
    ctx.fillStyle="#e6262b";ctx.fill();ctx.stroke();
    // braid
    ctx.fillStyle="#1a1a1a";
    ctx.beginPath();ctx.arc(r*0.72,-ry*0.30,r*0.10,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(r*0.92,-ry*0.10,r*0.09,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(r*1.08,ry*0.10,r*0.08,0,Math.PI*2);ctx.fill();
  }else if(hat==="arrow"){
    // suction-cup arrow stuck in head
    ctx.beginPath();ctx.moveTo(r*0.52,-ry*0.66);ctx.lineTo(r*0.98,-ry*1.10);
    ctx.lineWidth=Math.max(2,r*0.09);ctx.strokeStyle="#6f6f6f";ctx.stroke();
    ctx.lineWidth=lw;ctx.strokeStyle="#1a1a1a";
    ctx.beginPath();ctx.ellipse(r*0.50,-ry*0.62,r*0.15,r*0.11,0.7,0,Math.PI*2);
    ctx.fillStyle="#f2df6f";ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(r*0.50,-ry*0.62,r*0.06,r*0.045,0.7,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle="#cfcfcf";
    ctx.beginPath();
    ctx.moveTo(r*0.92,-ry*1.04);ctx.lineTo(r*1.02,-ry*1.34);ctx.lineTo(r*1.18,-ry*1.24);ctx.lineTo(r*1.06,-ry*0.98);
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*1.02,-ry*0.94);ctx.lineTo(r*1.28,-ry*1.12);ctx.lineTo(r*1.36,-ry*0.96);ctx.lineTo(r*1.12,-ry*0.82);
    ctx.closePath();ctx.fill();ctx.stroke();
  }
  ctx.restore();
}

function drawRacket(x,y,r,ang){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);
  ctx.lineCap="round";
  // grip
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-r*0.55);
  ctx.lineWidth=r*0.16;ctx.strokeStyle="#c98850";ctx.stroke();
  // head
  ctx.beginPath();ctx.ellipse(0,-r*1.05,r*0.42,r*0.55,0,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,0.9)";ctx.fill();
  ctx.lineWidth=r*0.10;ctx.strokeStyle="#e0433f";ctx.stroke();
  ctx.lineWidth=Math.max(1,r*0.03);ctx.strokeStyle="#b9c4cc";
  for(let i=-1;i<=1;i++){
    ctx.beginPath();ctx.moveTo(i*r*0.18,-r*1.55);ctx.lineTo(i*r*0.18,-r*0.55);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*0.40,-r*1.05+i*r*0.22);ctx.lineTo(r*0.40,-r*1.05+i*r*0.22);ctx.stroke();
  }
  ctx.restore();
}

/* ---------- opponent sprites ---------- */
const oppImgs={ready:new Image(),swingL:new Image(),swingR:new Image()};
oppImgs.ready.src="opp_ready.png";
oppImgs.swingL.src="opp_swing_left.png";
oppImgs.swingR.src="opp_swing_right.png";
let oppHitT=0,oppSide="R";

/* ---------- player sprites (後ろ姿) ---------- */
const playerImgs={idle:new Image(),swingL:new Image(),swingR:new Image()};
playerImgs.idle.src="player_idle.png";
playerImgs.swingL.src="player_swing_left.png";
playerImgs.swingR.src="player_swing_right.png";
let plSide="R";

/* ---------- title art ---------- */
const titleImg=new Image();titleImg.src="title.jpg";

/* ---------- ball sprites ---------- */
const ballImgs={},dizzyImgs={};
HATS.forEach(n=>{
  const im=new Image();im.src="ball_"+n+".png";ballImgs[n]=im;
  const dz=new Image();dz.src="ball_"+n+"_dizzy.png";dizzyImgs[n]=dz;
});
function drawBallChar(x,y,r,name,rot,dizzy){
  let img=dizzy?dizzyImgs[name]:ballImgs[name];
  if(!(img&&img.complete&&img.naturalWidth))img=ballImgs[name];
  if(img&&img.complete&&img.naturalWidth){
    const s=2.25*r/Math.max(img.naturalWidth,img.naturalHeight);
    ctx.save();ctx.translate(x,y);ctx.rotate(rot||0);
    ctx.drawImage(img,-img.naturalWidth*s/2,-img.naturalHeight*s/2,img.naturalWidth*s,img.naturalHeight*s);
    ctx.restore();
  }else drawChar(x,y,r,name,false);
}

/* ---------- game state ---------- */
let state="title";

/* ---------- 難易度 ---------- */
const LVS={
  easy:  {name:"かんたん",Tin0:0.95,Tmin:0.38,decay:0.975,spread:0.55,arcs:[0.20],easeN:25},
  normal:{name:"ふつう",  Tin0:0.70,Tmin:0.33,decay:0.972,spread:0.62,arcs:[0.20],easeN:15},
  hard:  {name:"ムズい",  Tin0:0.66,Tmin:0.26,decay:0.962,spread:0.82,arcs:[0.10,0.20,0.34],easeN:8},
};
let diff=localStorage.getItem("tamavolley_diff")||"easy";
if(!LVS[diff])diff="easy";
const bestKey=()=>"tamavolley_best3_"+diff;

let rally=0,score=0,best=+(localStorage.getItem("tamavolley_best3_"+diff)||0);

/* ---------- コンボ＆フィーバー ---------- */
let combo=0,fever=0,gameEx=0,gameFevers=0;

/* ---------- 実績・称号 ---------- */
const ACH=[
 {id:"first_ex",name:"ど真ん中デビュー",desc:"はじめてExcellentを出す"},
 {id:"rally10",name:"はじめの一歩",desc:"1ゲームで10ラリー"},
 {id:"combo5",name:"コンボマスター",desc:"フィーバーに突入する"},
 {id:"ex10",name:"エクセレント職人",desc:"累計Excellent 10回"},
 {id:"score100",name:"100点プレイヤー",desc:"1ゲームで100点"},
 {id:"rally50",name:"ラリーの鬼",desc:"1ゲームで50ラリー"},
 {id:"fever5",name:"フィーバー中毒",desc:"累計フィーバー5回"},
 {id:"games10",name:"ナンシキ村の常連",desc:"累計10ゲーム遊ぶ"},
 {id:"total1000",name:"千点の道",desc:"累計スコア1000点"},
 {id:"ex20game",name:"神ってる",desc:"1ゲームでExcellent20回"},
];
const TITLES=[[0,"たまご"],[1,"ナンシキ村の村人"],[3,"ナンシキ村の選手"],[5,"ナンシキ村のエース"],[7,"ナンシキ村の達人"],[9,"村の英雄"],[10,"ナンシキの神"]];
let ach;
try{ach=JSON.parse(localStorage.getItem("tamavolley_ach"))||null;}catch(e){ach=null;}
if(!ach||!ach.un||!ach.st)ach={un:{},st:{games:0,tScore:0,tEx:0,fevers:0}};
let achToast=[];
const saveAch=()=>localStorage.setItem("tamavolley_ach",JSON.stringify(ach));
function currentTitle(){
  const n=Object.keys(ach.un).length;
  let t=TITLES[0][1];
  for(const[c,name]of TITLES)if(n>=c)t=name;
  return t;
}
function unlock(id){
  if(ach.un[id])return;
  ach.un[id]=true;saveAch();
  const a=ACH.find(x=>x.id===id);
  achToast.push({name:a.name,age:0});
  beep(990,0.12,"sine",0.12);
  setTimeout(()=>beep(1320,0.15,"sine",0.12),110);
}
function checkAch(){
  if(gameEx>=1)unlock("first_ex");
  if(rally>=10)unlock("rally10");
  if(gameFevers>=1)unlock("combo5");
  if(ach.st.tEx>=10)unlock("ex10");
  if(score>=100)unlock("score100");
  if(rally>=50)unlock("rally50");
  if(ach.st.fevers>=5)unlock("fever5");
  if(ach.st.games>=10)unlock("games10");
  if(ach.st.tScore>=1000)unlock("total1000");
  if(gameEx>=20)unlock("ex20game");
}
let ball=null,charIdx=Math.floor(Math.random()*HATS.length);
let oppX=0,swing=0,swingCd=0,shake=0,serveAt=0,overAt=0,newBest=false,playStartAt=0;
let popups=[],bursts=[];
let last=performance.now();
function addBurst(x,y,r){bursts.push({x,y,r,age:0});}

const Tin=()=>{const L=LVS[diff];return Math.max(L.Tmin,L.Tin0*Math.pow(L.decay,rally));};

function serve(){
  const L=LVS[diff];
  charIdx=(charIdx+1)%HATS.length;
  oppHitT=0.32;
  oppSide=oppX<0?"L":"R";
  const arc=L.arcs[Math.floor(Math.random()*L.arcs.length)];
  ball={dir:1,t:0,T:Tin(),fromX:oppX,toX:rand(-L.spread,L.spread),ch:charIdx,rot:0,arc};
}
function startGame(){
  state="play";rally=0;score=0;newBest=false;ball=null;oppX=rand(-0.3,0.3);
  combo=0;fever=0;gameEx=0;gameFevers=0;
  best=+(localStorage.getItem(bestKey())||0);
  localStorage.setItem("tamavolley_diff",diff);
  serveAt=performance.now()+700;popups=[];
  playStartAt=performance.now();
  beep(660,0.10,"sine",0.12);
}
function ballPos(){
  const t=ball.t;
  const z=ball.dir===1?OPPZ*(1-t):OPPZ*t;
  const x=lerp(ball.fromX,ball.toX,t);
  const y=lerp(0.28,0.30,t)+Math.sin(Math.PI*t)*(ball.arc||0.20); // 軌道の高さは球種による
  return{x,z,y,bx:sx(x,z),by:sy(z,y),br:Math.max(8,0.115*W*sc(z))};
}
function addPopup(x,y,txt,col){popups.push({x,y,txt,col:col||"#ff5f7e",age:0});}

function miss(){
  state="over";overAt=performance.now();shake=10;
  ach.st.games++;checkAch();saveAch();
  addPopup(W*0.38,H*0.68,"★","#f5c518");
  addPopup(W*0.55,H*0.64,"★","#f5c518");
  addPopup(W*0.47,H*0.72,"★","#f5c518");
  beep(180,0.35,"sawtooth",0.12);
  setTimeout(()=>beep(120,0.4,"sawtooth",0.10),120);
}

function update(dt){
  swing=Math.max(0,swing-dt);
  swingCd=Math.max(0,swingCd-dt);
  oppHitT=Math.max(0,oppHitT-dt);
  fever=Math.max(0,fever-dt);
  achToast.forEach(t=>t.age+=dt);
  achToast=achToast.filter(t=>t.age<3);
  shake=Math.max(0,shake-dt*30);
  popups.forEach(p=>p.age+=dt);
  popups=popups.filter(p=>p.age<0.9);
  bursts.forEach(b=>b.age+=dt);
  bursts=bursts.filter(b=>b.age<0.35);
  if(state!=="play")return;
  if(!ball){
    if(performance.now()>=serveAt)serve();
    return;
  }
  ball.t+=dt/ball.T;
  ball.rot+=dt*(ball.dir===1?9:-9);
  if(ball.dir===-1){
    oppX=lerp(oppX,ball.toX,Math.min(1,dt*6));
    if(ball.t>=1){ // opponent returns
      oppX=ball.toX;
      playHit(0.45); // 遠いので小さめ
      serve();
    }
  }else if(ball.t>=1){
    miss();
  }
}

/* ---------- input ---------- */
cv.addEventListener("pointerdown",e=>{
  e.preventDefault();
  if(AC&&AC.state==="suspended")AC.resume();
  const px=e.clientX,py=e.clientY;
  if(state==="ach"){state="title";return;}
  if(state==="title"){
    if(px<W*0.34&&py<H*0.09){state="ach";return;}
    state="level";return;
  }
  if(state==="level"){
    const keys=["easy","normal","hard"];
    for(let i=0;i<3;i++){
      const y0=H*(0.20+i*0.19);
      if(py>=y0&&py<=y0+H*0.15&&px>=W*0.07&&px<=W*0.93){
        diff=keys[i];startGame();return;
      }
    }
    if(py>H*0.82)state="title";
    return;
  }
  if(state==="over"){
    if(performance.now()-overAt>600)startGame();
    return;
  }
  if(swingCd>0)return; // スイング硬直中（連打防止）
  swingCd=0.34;
  swing=0.25;
  plSide=px<W/2?"L":"R";
  let hitDone=false;
  if(ball&&ball.dir===1){
    const p=ballPos();
    const ease=Math.min(1,rally/LVS[diff].easeN); // 0=序盤ゆるゆる → 1=本気判定（レベルで到達速度が変わる）
    const inRange=p.z<=NETZ+0.16*(1-ease); // 序盤はネット手前でも打てる
    const dist=Math.hypot(px-p.bx,py-p.by);
    const hitR=(Math.max(46,p.br*1.7)+20)*(2.0-1.0*ease);
    if(inRange&&dist<=hitR){
      hitDone=true;
      rally++;
      // タイミング×打点サイドで返球方向が決まる
      // 早め（ネット越えてすぐ）＝逆サイドへ、遅め（引きつけ）＝同じサイドへ、ちょうど＝ど真ん中
      const zMax=NETZ+0.16*(1-ease);
      const zN=0.06; // 引きつけポイント：プレイヤーの目の前まで待つとまっすぐ飛ぶ
      let tau; // 1=早い 0.5=ちょうど（目の前） 0=遅い
      if(p.z>=zN)tau=0.5+0.5*Math.min(1,(p.z-zN)/(zMax-zN));
      else tau=0.5*(p.z/zN);
      const sideSign=p.x>=0?1:-1;
      let toX=sideSign*(1-2*tau)*(0.65+Math.abs(p.x)*0.3)+rand(-0.05,0.05);
      toX=clamp(toX,-0.9,0.9);
      // センターに近いほど高得点（マイナスなし、1〜3点）
      const ax=Math.abs(toX);
      let pts,grade,col;
      if(ax<=0.15){pts=3;grade="Excellent!!";col="#ff9a2e";beep(1320,0.14,"sine",0.14);}
      else if(ax<=0.40){pts=2;grade="Good!";col="#2b6bd9";}
      else{pts=1;grade="Nice";col="#ff5f7e";}
      // コンボ：Excellent連続で加算、5でフィーバー突入（10秒間 得点2倍）
      if(pts===3){
        combo++;gameEx++;ach.st.tEx++;
        if(combo>=5&&fever<=0){
          fever=10;gameFevers++;ach.st.fevers++;combo=0;
          addPopup(W/2,H*0.35,"🔥FEVER TIME!🔥","#ff6a00");
          [880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,0.15,"sine",0.14),i*90));
        }
      }else combo=0;
      if(fever>0)pts*=2;
      const label=grade+" +"+pts;
      score+=pts;ach.st.tScore+=pts;
      checkAch();
      if(score>best){best=score;newBest=true;localStorage.setItem(bestKey(),best);}
      playHit(1);
      addPopup(p.bx,p.by,label,col);
      addBurst(p.bx,p.by,p.br);
      if(rally%10===0){addPopup(W/2,H*0.42,rally+"回ラリー！","#ff9a2e");beep(1180,0.15,"sine",0.14);}
      ball={dir:-1,t:0,T:0.62,fromX:p.x,toX,ch:ball.ch,rot:ball.rot,arc:0.20};
    }
  }
  if(!hitDone){ // 空振り
    beep(250,0.09,"sine",0.07);
    addPopup(px,py-30,"スカッ","#9aa7b5");
  }
},{passive:false});

/* ---------- render ---------- */
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function outlineText(txt,x,y,size,fill,stroke,lw){
  ctx.font="bold "+size+"px "+FONT;
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.lineJoin="round";
  ctx.lineWidth=lw||size*0.18;ctx.strokeStyle=stroke||"#fff";
  ctx.strokeText(txt,x,y);
  ctx.fillStyle=fill;ctx.fillText(txt,x,y);
}

function render(){
  ctx.save();
  if(shake>0)ctx.translate(rand(-shake,shake),rand(-shake,shake));

  // sky
  const g=ctx.createLinearGradient(0,0,0,H*0.5);
  g.addColorStop(0,"#8fd3f4");g.addColorStop(1,"#d9f0fb");
  ctx.fillStyle=g;ctx.fillRect(-20,-20,W+40,H*0.55);
  // clouds
  ctx.fillStyle="rgba(255,255,255,0.85)";
  [[0.18,0.10],[0.72,0.16],[0.45,0.06]].forEach(c=>{
    const cx=c[0]*W,cy=c[1]*H;
    ctx.beginPath();ctx.ellipse(cx,cy,W*0.09,H*0.025,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+W*0.05,cy-H*0.012,W*0.06,H*0.02,0,0,Math.PI*2);ctx.fill();
  });
  // trees
  ctx.fillStyle="#3f9a55";
  for(let i=0;i<9;i++){
    const tx=(i+0.5)/9*W;
    ctx.beginPath();ctx.ellipse(tx,gy(1)-H*0.115,W*0.075,H*0.045,0,0,Math.PI*2);ctx.fill();
  }
  // fence
  const fTop=gy(1)-H*0.095;
  ctx.fillStyle="#2e7d46";ctx.fillRect(-20,fTop,W+40,gy(1)-fTop);
  ctx.strokeStyle="rgba(0,0,0,0.22)";ctx.lineWidth=1;
  for(let x=0;x<W;x+=14){ctx.beginPath();ctx.moveTo(x,fTop);ctx.lineTo(x,gy(1));ctx.stroke();}
  for(let y=fTop;y<gy(1);y+=10){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // ground
  ctx.fillStyle="#5aa54e";ctx.fillRect(-20,gy(1),W+40,H-gy(1)+20);
  // court
  ctx.beginPath();
  ctx.moveTo(sx(-1.15,1),gy(1));ctx.lineTo(sx(1.15,1),gy(1));
  ctx.lineTo(sx(1.15,0),gy(0)+H*0.07);ctx.lineTo(sx(-1.15,0),gy(0)+H*0.07);
  ctx.closePath();ctx.fillStyle="#3f8f3f";ctx.fill();
  // lines
  ctx.strokeStyle="#fff";
  const line=(x1,z1,x2,z2,w)=>{ctx.lineWidth=w||3;ctx.beginPath();ctx.moveTo(sx(x1,z1),gy(z1));ctx.lineTo(sx(x2,z2),gy(z2));ctx.stroke();};
  line(-0.85,0.02,-0.85,0.97);line(0.85,0.02,0.85,0.97);
  line(-0.85,0.97,0.85,0.97,3);
  line(0,0.02,0,0.97,2);
  line(-0.85,0.58,0.85,0.58,2);
  // 引きつけベストゾーン（ここで打つとまっすぐ＝高得点が狙える）
  if(state==="play"){
    ctx.fillStyle="rgba(255,220,80,0.16)";
    ctx.beginPath();
    ctx.moveTo(sx(-1.0,0.02),gy(0.02));ctx.lineTo(sx(1.0,0.02),gy(0.02));
    ctx.lineTo(sx(1.0,0.10),gy(0.10));ctx.lineTo(sx(-1.0,0.10),gy(0.10));
    ctx.closePath();ctx.fill();
  }

  // opponent (net より奥なので先に描く)
  const oz=OPPZ,orr=0.11*W;
  {
    let img=oppHitT>0?(oppSide==="L"?oppImgs.swingL:oppImgs.swingR):oppImgs.ready;
    if(!(img.complete&&img.naturalWidth))img=oppImgs.ready;
    const ox=sx(oppX,oz),og=gy(oz);
    if(img.complete&&img.naturalWidth){
      const poseK=img===oppImgs.swingR?0.94:1; // 右振りは絵の作りで大きく見えるため補正
      const oh=0.62*W*sc(oz)*poseK;
      const ow=oh*img.naturalWidth/img.naturalHeight;
      const bob=oppHitT>0?0:Math.sin(performance.now()/280)*H*0.003;
      ctx.fillStyle="rgba(0,0,0,0.18)";
      ctx.beginPath();ctx.ellipse(ox,og,ow*0.42,oh*0.07,0,0,Math.PI*2);ctx.fill();
      ctx.drawImage(img,ox-ow/2,og-oh+bob,ow,oh);
    }else{
      drawChar(ox,og-orr*0.95,orr,HATS[(charIdx+2)%HATS.length],false);
    }
  }

  const p=ball?ballPos():null;
  // ball shadow + ball behind net
  const drawBall=()=>{
    if(!p)return;
    ctx.fillStyle="rgba(0,0,0,0.18)";
    ctx.beginPath();ctx.ellipse(p.bx,gy(p.z),p.br*0.8,p.br*0.25,0,0,Math.PI*2);ctx.fill();
    // spin swoosh
    const a=ball.rot*1.4;
    ctx.strokeStyle="rgba(255,255,255,0.6)";
    ctx.lineWidth=Math.max(2,p.br*0.13);ctx.lineCap="round";
    ctx.beginPath();ctx.arc(p.bx,p.by,p.br*1.32,a,a+1.0);ctx.stroke();
    ctx.beginPath();ctx.arc(p.bx,p.by,p.br*1.32,a+Math.PI,a+Math.PI+1.0);ctx.stroke();
    drawBallChar(p.bx,p.by,p.br,HATS[ball.ch],Math.sin(ball.rot)*0.3);
  };
  if(p&&p.z>NETZ)drawBall();

  // net
  const nz=NETZ,nTop=sy(nz,0.20),nG=gy(nz);
  const nx1=sx(-1.0,nz),nx2=sx(1.0,nz);
  ctx.fillStyle="rgba(30,42,70,0.42)";
  ctx.fillRect(nx1,nTop,nx2-nx1,nG-nTop);
  ctx.strokeStyle="rgba(255,255,255,0.55)";ctx.lineWidth=1;
  for(let x=nx1;x<=nx2;x+=9){ctx.beginPath();ctx.moveTo(x,nTop);ctx.lineTo(x,nG);ctx.stroke();}
  for(let y=nTop;y<=nG;y+=8){ctx.beginPath();ctx.moveTo(nx1,y);ctx.lineTo(nx2,y);ctx.stroke();}
  ctx.fillStyle="#fff";ctx.fillRect(nx1,nTop-4,nx2-nx1,7);
  ctx.strokeStyle="#38424f";ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(nx1,nTop-4);ctx.lineTo(nx1,nG);ctx.stroke();
  ctx.beginPath();ctx.moveTo(nx2,nTop-4);ctx.lineTo(nx2,nG);ctx.stroke();

  if(p&&p.z<=NETZ)drawBall();

  // player (back view)
  {
    let img=swing>0?(plSide==="L"?playerImgs.swingL:playerImgs.swingR):playerImgs.idle;
    if(!(img.complete&&img.naturalWidth))img=playerImgs.idle;
    if(img.complete&&img.naturalWidth){
      const ph=0.46*W*(swing>0?1.05:1);
      const pw=ph*img.naturalWidth/img.naturalHeight;
      const bob=swing>0?0:Math.sin(performance.now()/300)*H*0.004;
      ctx.drawImage(img,W/2-pw/2,H*1.02-ph+bob,pw,ph);
    }else{
      const pr=0.155*W;
      const swAng=swing>0?lerp(-1.7,0.5,swing/0.25):0.5;
      drawRacket(W/2+pr*0.95,H*1.00-pr*0.55,pr*0.75,swAng);
      drawChar(W/2,H*1.00,pr,"cap",true);
    }
  }

  // hit bursts
  bursts.forEach(b=>{
    const k=b.age/0.35,alpha=1-k;
    ctx.strokeStyle="rgba(255,214,60,"+alpha.toFixed(2)+")";
    ctx.lineWidth=Math.max(2,b.r*0.14);ctx.lineCap="round";
    for(let i=0;i<6;i++){
      const ang=i*Math.PI/3+0.4;
      const r0=b.r*(1.1+k*1.6),r1=r0+b.r*0.45;
      ctx.beginPath();
      ctx.moveTo(b.x+Math.cos(ang)*r0,b.y+Math.sin(ang)*r0);
      ctx.lineTo(b.x+Math.cos(ang)*r1,b.y+Math.sin(ang)*r1);
      ctx.stroke();
    }
  });

  // popups
  popups.forEach(pp=>{
    const a=1-pp.age/0.9;
    ctx.globalAlpha=Math.max(0,a);
    outlineText(pp.txt,pp.x,pp.y-pp.age*70,Math.min(W*0.085,34),pp.col,"#fff");
    ctx.globalAlpha=1;
  });

  // fever演出
  if(fever>0&&state==="play"){
    const pulse=0.08+0.05*Math.sin(performance.now()/120);
    ctx.fillStyle=`rgba(255,180,40,${pulse.toFixed(3)})`;
    ctx.fillRect(-20,-20,W+40,H+40);
    ctx.fillStyle="rgba(255,240,150,0.9)";
    for(let i=0;i<10;i++){
      const sx2=((i*137+performance.now()*0.05*(1+i%3))%W);
      const sy2=((i*211+performance.now()*0.09)%H);
      const r2=2+(i%3);
      ctx.beginPath();
      ctx.moveTo(sx2,sy2-r2*2);ctx.lineTo(sx2+r2*0.7,sy2);ctx.lineTo(sx2,sy2+r2*2);ctx.lineTo(sx2-r2*0.7,sy2);
      ctx.closePath();ctx.fill();
    }
  }

  // HUD
  if(state!=="title"&&state!=="ach"&&state!=="level"){
    outlineText(String(score),W/2,H*0.09,W*0.14,fever>0?"#ff6a00":"#2b6bd9","#fff",W*0.02);
    outlineText("スコア",W/2,H*0.155,W*0.042,"#2b6bd9","#fff");
    outlineText("れんぞく "+rally,W*0.16,H*0.05,W*0.04,"#2e7d46","#fff");
    outlineText("ベスト "+best,W*0.85,H*0.05,W*0.045,"#e0433f","#fff");
    outlineText(LVS[diff].name,W*0.85,H*0.095,W*0.038,"#7a5cd6","#fff");
    if(combo>=2)outlineText("コンボ x"+combo,W*0.16,H*0.095,W*0.045,"#ff6a00","#fff");
    if(fever>0){
      const fs=W*0.06*(1+0.08*Math.sin(performance.now()/100));
      outlineText("🔥 FEVER ×2 🔥",W/2,H*0.21,fs,"#ff6a00","#fff");
      ctx.fillStyle="rgba(255,255,255,0.7)";
      ctx.fillRect(W*0.3,H*0.24,W*0.4,8);
      ctx.fillStyle="#ff6a00";
      ctx.fillRect(W*0.3,H*0.24,W*0.4*(fever/10),8);
    }
    if(state==="play"&&performance.now()-playStartAt<4500){
      outlineText("はやめ＝逆サイド／おそめ＝同じサイドへとぶ！",W/2,H*0.30,W*0.038,"#4a4a4a","#fff");
      outlineText("黄色ゾーンまで引きつけて打つと まっすぐ高得点！",W/2,H*0.345,W*0.040,"#ff9a2e","#fff");
    }
  }

  // 実績解除トースト
  achToast.forEach((t,i)=>{
    const a=t.age<0.3?t.age/0.3:(t.age>2.4?Math.max(0,(3-t.age)/0.6):1);
    ctx.globalAlpha=a;
    const y=H*0.25+i*H*0.055;
    ctx.fillStyle="rgba(50,40,10,0.85)";
    roundRect(W*0.1,y-H*0.022,W*0.8,H*0.045,12);ctx.fill();
    ctx.font="bold "+(W*0.038)+"px "+FONT;
    ctx.fillStyle="#ffd76e";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("🏆 実績解除「"+t.name+"」",W/2,y);
    ctx.globalAlpha=1;
  });

  if(state==="title")renderTitle();
  if(state==="ach"){renderTitle();renderAch();}
  if(state==="level"){renderTitle();renderLevel();}
  if(state==="over")renderOver();
  ctx.restore();
}

function renderLevel(){
  ctx.fillStyle="rgba(30,30,30,0.55)";ctx.fillRect(0,0,W,H);
  outlineText("レベルをえらんでね！",W/2,H*0.13,W*0.065,"#fff","#2b6bd9",W*0.012);
  const items=[
    ["かんたん","ゆったりスタート。はじめてはこれ！","#2e7d46"],
    ["ふつう","さいしょから速い！うでだめし","#2b6bd9"],
    ["ムズい","高い球・低い球＆急加速＆ワイド配球！","#d94848"],
  ];
  const keys=["easy","normal","hard"];
  items.forEach(([name,desc,col],i)=>{
    const y0=H*(0.20+i*0.19);
    ctx.fillStyle="rgba(255,250,240,0.96)";
    roundRect(W*0.07,y0,W*0.86,H*0.15,20);ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=5;
    roundRect(W*0.07,y0,W*0.86,H*0.15,20);ctx.stroke();
    outlineText(name,W/2,y0+H*0.052,W*0.065,col,"#fff");
    ctx.font="bold "+(W*0.034)+"px "+FONT;
    ctx.fillStyle="#4a4a4a";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(desc,W/2,y0+H*0.105);
    const b=+(localStorage.getItem("tamavolley_best3_"+keys[i])||0);
    if(b>0){
      ctx.font="bold "+(W*0.030)+"px "+FONT;
      ctx.fillStyle="#e0433f";
      ctx.fillText("ベスト "+b+" 点",W/2,y0+H*0.135);
    }
  });
  outlineText("▼ タイトルにもどる",W/2,H*0.88,W*0.045,"#fff","#4a4a4a",W*0.008);
}

function renderAch(){
  ctx.fillStyle="rgba(30,30,30,0.55)";ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(255,250,240,0.97)";
  roundRect(W*0.05,H*0.06,W*0.90,H*0.84,20);ctx.fill();
  ctx.strokeStyle="#ffd76e";ctx.lineWidth=4;roundRect(W*0.05,H*0.06,W*0.90,H*0.84,20);ctx.stroke();
  outlineText("🏆 じっせき",W/2,H*0.115,W*0.06,"#ff9a2e","#fff");
  outlineText("称号："+currentTitle(),W/2,H*0.165,W*0.048,"#2b6bd9","#fff");
  ctx.textAlign="left";ctx.textBaseline="middle";
  ACH.forEach((a,i)=>{
    const y=H*0.225+i*H*0.06;
    const got=!!ach.un[a.id];
    ctx.font="bold "+(W*0.038)+"px "+FONT;
    ctx.fillStyle=got?"#2e7d46":"#b5b5b5";
    ctx.fillText((got?"✅ ":"⬜ ")+a.name,W*0.10,y);
    ctx.font=(W*0.028)+"px "+FONT;
    ctx.fillStyle=got?"#7a8677":"#c5c5c5";
    ctx.fillText(a.desc,W*0.15,y+H*0.026);
  });
  ctx.textAlign="center";
  outlineText("あと"+(ACH.length-Object.keys(ach.un).length)+"こで しんか？ タップでもどる",W/2,H*0.865,W*0.038,"#4a4a4a","#fff");
}

function renderTitle(){
  if(titleImg.complete&&titleImg.naturalWidth){
    const iw=titleImg.naturalWidth,ih=titleImg.naturalHeight;
    const s=Math.max(W/iw,H/ih);
    ctx.drawImage(titleImg,(W-iw*s)/2,(H-ih*s)/2,iw*s,ih*s);
    outlineText("称号："+currentTitle(),W/2,H*0.915,W*0.042,"#2b6bd9","#fff");
    if(best>0)outlineText("ベスト "+best+" 点",W/2,H*0.958,W*0.042,"#e0433f","#fff");
    // 実績ボタン（左上）
    ctx.fillStyle="rgba(255,250,240,0.9)";
    roundRect(W*0.02,H*0.02,W*0.30,H*0.055,14);ctx.fill();
    ctx.strokeStyle="#ffd76e";ctx.lineWidth=3;roundRect(W*0.02,H*0.02,W*0.30,H*0.055,14);ctx.stroke();
    ctx.font="bold "+(W*0.04)+"px "+FONT;
    ctx.fillStyle="#ff9a2e";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("🏆 じっせき",W*0.17,H*0.048);
    return;
  }
  // タイトル画像ロード中はシンプルな読み込み表示のみ（旧画面は出さない）
  ctx.fillStyle="#8fd3f4";ctx.fillRect(0,0,W,H);
  const dots=".".repeat(1+Math.floor(performance.now()/400)%3);
  outlineText("よみこみちゅう"+dots,W/2,H*0.5,W*0.05,"#2b6bd9","#fff");
}

function renderOver(){
  ctx.fillStyle="rgba(255,250,240,0.9)";
  roundRect(W*0.08,H*0.22,W*0.84,H*0.40,24);ctx.fill();
  ctx.strokeStyle="#ffd76e";ctx.lineWidth=5;roundRect(W*0.08,H*0.22,W*0.84,H*0.40,24);ctx.stroke();
  outlineText("ざんねん…！",W/2,H*0.28,W*0.07,"#4a4a4a","#fff");
  outlineText("スコア "+score+" 点",W/2,H*0.37,W*0.09,"#ff5f7e","#fff",W*0.018);
  outlineText("（"+rally+"回ラリー）",W/2,H*0.43,W*0.045,"#4a4a4a","#fff");
  if(newBest&&score>0)outlineText("✨ しんきろく！ ✨",W/2,H*0.485,W*0.06,"#ff9a2e","#fff");
  else outlineText("ベスト "+best+" 点（"+LVS[diff].name+"）",W/2,H*0.485,W*0.05,"#e0433f","#fff");
  outlineText("称号："+currentTitle(),W/2,H*0.655,W*0.042,"#2b6bd9","#fff");
  drawBallChar(W*0.5,H*0.545,W*0.055,HATS[charIdx],Math.sin(performance.now()/180)*0.2,true);
  if(performance.now()-overAt>600&&Math.floor(performance.now()/600)%2===0)
    outlineText("タップで もういちど！",W/2,H*0.72,W*0.058,"#2b6bd9","#fff");
}

function loop(now){
  const dt=Math.min(0.033,(now-last)/1000);last=now;
  update(dt);render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
